<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AR Multi-Point 3D Measure</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#ui{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,.5);
padding:10px 20px;
border-radius:10px;
color:white;
}

button{
padding:10px 15px;
margin:5px;
font-size:16px;
border:none;
border-radius:6px;
}

</style>
</head>

<body>

<div id="ui">
<button id="clear">Clear</button>
<div id="info">Move phone to detect surface</div>
</div>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.158.0/build/three.module.js"
import { ARButton } from "https://unpkg.com/three@0.158.0/examples/jsm/webxr/ARButton.js"

let camera, scene, renderer
let hitTestSource = null
let hitTestSourceRequested = false
let currentHitPose = null

const points=[]
const spheres=[]
const lines=[]

init()

function init(){

scene = new THREE.Scene()

camera = new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
)

renderer = new THREE.WebGLRenderer({antialias:true,alpha:true})
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.xr.enabled = true

document.body.appendChild(renderer.domElement)

document.body.appendChild(
ARButton.createButton(renderer,{ requiredFeatures:["hit-test"] })
)

renderer.setAnimationLoop(render)

window.addEventListener("resize",onResize)

document.body.addEventListener("click",placePoint)

document.getElementById("clear").onclick=clearPoints

}

function onResize(){

camera.aspect = window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

}

function placePoint(){

if(!currentHitPose) return

const pos = new THREE.Vector3(
currentHitPose.transform.position.x,
currentHitPose.transform.position.y,
currentHitPose.transform.position.z
)

points.push(pos)

createSphere(pos)

if(points.length>1){

const prev = points[points.length-2]

createLine(prev,pos)

const dist = prev.distanceTo(pos)

document.getElementById("info").innerText =
"Distance: "+dist.toFixed(3)+" meters"

}

}

function createSphere(position){

const geo = new THREE.SphereGeometry(.01,16,16)
const mat = new THREE.MeshBasicMaterial({color:0xff0000})

const mesh = new THREE.Mesh(geo,mat)
mesh.position.copy(position)

scene.add(mesh)

spheres.push(mesh)

}

function createLine(a,b){

const material = new THREE.LineBasicMaterial({color:0xffff00})

const geometry = new THREE.BufferGeometry().setFromPoints([a,b])

const line = new THREE.Line(geometry,material)

scene.add(line)

lines.push(line)

}

function clearPoints(){

points.length=0

spheres.forEach(s=>scene.remove(s))
lines.forEach(l=>scene.remove(l))

spheres.length=0
lines.length=0

document.getElementById("info").innerText="Points cleared"

}

function render(timestamp,frame){

if(frame){

const referenceSpace = renderer.xr.getReferenceSpace()
const session = renderer.xr.getSession()

if(!hitTestSourceRequested){

session.requestReferenceSpace("viewer").then(space=>{

session.requestHitTestSource({space}).then(source=>{
hitTestSource = source
})

})

session.addEventListener("end",()=>{
hitTestSourceRequested=false
hitTestSource=null
})

hitTestSourceRequested = true

}

if(hitTestSource){

const hitTestResults = frame.getHitTestResults(hitTestSource)

if(hitTestResults.length){

const hit = hitTestResults[0]

currentHitPose = hit.getPose(referenceSpace)

}

}

}

renderer.render(scene,camera)

}

</script>

</body>
</html>
