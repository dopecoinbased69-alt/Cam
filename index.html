<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile AR Camera Tool</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
color:white;
}

video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

ui{
position:absolute;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
padding:15px;
background:rgba(0,0,0,.4);
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
font-size:16px;
background:#00c8ff;
color:black;
font-weight:bold;
}

#distance{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
font-size:22px;
background:rgba(0,0,0,.5);
padding:10px 20px;
border-radius:10px;
}

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="overlay"></canvas>

<div id="distance">Tap two points to measure</div>

<ui>
<button id="capture">Capture</button>
<button id="clear">Clear</button>
</ui>

<script>

const video = document.getElementById("video")
const canvas = document.getElementById("overlay")
const ctx = canvas.getContext("2d")
const distanceLabel = document.getElementById("distance")

let points=[]

async function startCamera(){

const stream = await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"environment"
},
audio:false
})

video.srcObject = stream

}

startCamera()

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

window.addEventListener("resize",resize)
resize()

canvas.addEventListener("touchstart",tap)

function tap(e){

const rect = canvas.getBoundingClientRect()

const x = e.touches[0].clientX - rect.left
const y = e.touches[0].clientY - rect.top

points.push({x,y})

if(points.length>2){
points=[]
}

draw()

if(points.length===2){
measure()
}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="red"

points.forEach(p=>{
ctx.beginPath()
ctx.arc(p.x,p.y,8,0,Math.PI*2)
ctx.fill()
})

if(points.length===2){

ctx.strokeStyle="yellow"
ctx.lineWidth=4
ctx.beginPath()
ctx.moveTo(points[0].x,points[0].y)
ctx.lineTo(points[1].x,points[1].y)
ctx.stroke()

}

}

function measure(){

const dx = points[1].x - points[0].x
const dy = points[1].y - points[0].y

const pixelDistance = Math.sqrt(dx*dx + dy*dy)

const approxMM = pixelDistance * 0.26

distanceLabel.innerText = approxMM.toFixed(1) + " mm (approx)"

}

document.getElementById("clear").onclick=()=>{

points=[]
distanceLabel.innerText="Tap two points to measure"
draw()

}

document.getElementById("capture").onclick=()=>{

const temp = document.createElement("canvas")
temp.width=canvas.width
temp.height=canvas.height

const tctx = temp.getContext("2d")

tctx.drawImage(video,0,0,temp.width,temp.height)
tctx.drawImage(canvas,0,0)

const img = temp.toDataURL("image/png")

const link=document.createElement("a")
link.href=img
link.download="capture.png"
link.click()

}

</script>

</body>

                <button class="w-24 h-24 rounded-full bg-white flex items-center justify-center shadow-[0_0_50px_rgba(255,255,255,0.3)] active:scale-90 transition-transform">

    <script>
        lucide.createIcons();

        const authGate = document.getElementById('auth-gate');
        const mainHud = document.getElementById('main-hud');
        const helpDrawer = document.getElementById('help-drawer');
        const initBtn = document.getElementById('init-engine');
        const video = document.getElementById('camera-feed');
        const camRow = document.getElementById('row-camera');
        const locRow = document.getElementById('row-location');

        function toggleHelp(show) {
            if (show) {
                helpDrawer.classList.add('active');
            } else {
                helpDrawer.classList.remove('active');
            }
        }

        async function attemptAuth() {
            initBtn.innerText = "LINKING HARDWARE...";
            initBtn.classList.add('permission-pulse');
            initBtn.disabled = true;

            try {
                // Request Camera
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' }, 
                    audio: false 
                });
                
                // Update UI State for Camera Success
                camRow.querySelector('.status-indicator').classList.replace('bg-zinc-700', 'bg-cyan-400');
                camRow.querySelector('.status-indicator').classList.add('shadow-[0_0_8px_#00f2ff]');
                camRow.querySelector('.mono').innerText = "LINK ESTABLISHED";
                camRow.classList.remove('opacity-50');

                // Request Location (Non-blocking)
                navigator.geolocation.getCurrentPosition((pos) => {
                    locRow.querySelector('.status-indicator').classList.replace('bg-zinc-700', 'bg-cyan-400');
                    locRow.querySelector('.mono').innerText = "SAT-LINK VERIFIED";
                    locRow.classList.remove('opacity-50');
                    document.getElementById('coord-out').innerText = `${pos.coords.latitude.toFixed(4)}N ${pos.coords.longitude.toFixed(4)}W`;
                });

                // Transition to Main HUD
                video.srcObject = stream;
                setTimeout(() => {
                    authGate.classList.add('opacity-0');
                    video.style.opacity = '1';
                    setTimeout(() => {
                        authGate.style.display = 'none';
                        mainHud.classList.replace('opacity-0', 'opacity-100');
                    }, 700);
                }, 1000);

            } catch (err) {
                console.error(err);
                // Handle Permission Denied
                initBtn.innerText = "ACCESS BLOCKED";
                initBtn.classList.replace('bg-cyan-500', 'bg-red-500');
                initBtn.classList.remove('permission-pulse');
                
                camRow.querySelector('.status-indicator').classList.replace('bg-zinc-700', 'bg-red-500');
                camRow.querySelector('.mono').innerText = "PERMISSION DENIED";
                camRow.querySelector('.mono').classList.add('text-red-500');
                
                setTimeout(() => toggleHelp(true), 500);
            }
        }

        initBtn.addEventListener('click', attemptAuth);

        // Micro-interactions
        document.addEventListener('touchstart', (e) => {
            const circle = document.createElement('div');
            circle.className = 'fixed w-12 h-12 border border-cyan-500/40 rounded-full pointer-events-none z-[200] animate-ping';
            circle.style.left = `${e.touches[0].clientX - 24}px`;
            circle.style.top = `${e.touches[0].clientY - 24}px`;
            document.body.appendChild(circle);
            setTimeout(() => circle.remove(), 800);
        });
    </script>
</body>
